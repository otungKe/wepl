name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite (Postgres + Redis)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wepl
          POSTGRES_USER: wepl
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wepl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-test-secret-key
      DB_NAME: wepl
      DB_USER: wepl
      DB_PASSWORD: password
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage

      - name: Guard — legacy ledger & mutable balance caches stay deleted (P0-07)
        run: |
          # Money moves only via post_journal(); balances are ledger-derived.
          pattern='LedgerEntry|write_ledger_entry|write_reversal_credit|ledger\.queries'
          pattern="$pattern|ContributionAccount|ContributionBalance"
          pattern="$pattern|current_amount[[:space:]]*=[[:space:]]*F\(|total_pool[[:space:]]*=[[:space:]]*F\(|balance[[:space:]]*=[[:space:]]*F\('balance'\)"
          if grep -rEn "$pattern" apps --include=*.py \
               | grep -vE "/migrations/|/tests\.py|/tests_"; then
            echo "::error::Legacy ledger / mutable balance cache reintroduced — money moves only via post_journal() and balances are ledger-derived."
            exit 1
          fi

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run test suite (with coverage)
        run: coverage run --source=apps manage.py test --noinput -v2

      # Gate the double-entry posting engine. The threshold ratchets up as Phase 0
      # removes legacy code (writer/queries/tasks) and rewrites money paths onto
      # post_journal() — at which point models.py and more join the gated set.
      - name: Enforce ledger-core coverage (>=90%)
        run: >-
          coverage report
          --include="apps/ledger/posting.py,apps/ledger/balances.py,apps/ledger/coa.py,apps/ledger/money.py,apps/ledger/posting_map.py"
          --fail-under=90

      # Gate the authorization policy layer (ADR-0009), session/token revocation
      # (ADR-0010) and tenant-isolation seams (ADR-0008). These are small,
      # security-critical modules; like the ledger core they must stay well-tested.
      - name: Enforce authz / session / isolation coverage (>=90%)
        run: >-
          coverage report
          --include="apps/core/policy.py,apps/communities/policies.py,apps/contributions/policies.py,apps/conversations/policies.py,apps/conversations/groups.py,apps/users/sessions.py,apps/users/token_views.py,apps/tenants/celery_hooks.py,apps/tenants/guards.py"
          --fail-under=90

      - name: Full coverage report (informational)
        if: always()
        run: coverage report
