name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite (Postgres + Redis)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wepl
          POSTGRES_USER: wepl
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wepl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-test-secret-key
      DB_NAME: wepl
      DB_USER: wepl
      DB_PASSWORD: password
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run test suite (with coverage on the ledger)
        run: coverage run --source=apps.ledger manage.py test --noinput -v2

      # Gate the double-entry posting engine. The threshold ratchets up as Phase 0
      # removes legacy code (writer/queries/tasks) and rewrites money paths onto
      # post_journal() — at which point models.py and more join the gated set.
      - name: Enforce ledger-core coverage (>=90%)
        run: >-
          coverage report
          --include="apps/ledger/posting.py,apps/ledger/balances.py,apps/ledger/coa.py"
          --fail-under=90

      - name: Full coverage report (informational)
        if: always()
        run: coverage report
