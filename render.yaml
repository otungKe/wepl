databases:
  - name: wepl-db
    databaseName: wepl
    user: wepl
    plan: free

services:
  - type: redis
    name: wepl-redis
    plan: free
    ipAllowList: []

  - type: web
    name: wepl-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash start.sh
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: wepl-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://wepl-api.onrender.com
      - key: STAGING_OTP_BYPASS
        value: "true"
      - key: SMS_BACKEND
        value: console
      - key: DB_NAME
        fromDatabase:
          name: wepl-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: wepl-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: wepl-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: wepl-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: wepl-db
          property: port
      - key: REDIS_URL
        fromService:
          type: redis
          name: wepl-redis
          property: connectionString
      - key: REDIS_CACHE_URL
        fromService:
          type: redis
          name: wepl-redis
          property: connectionString
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_BASE_URL
        value: https://sandbox.safaricom.co.ke
      - key: MPESA_CALLBACK_URL
        value: https://wepl-api.onrender.com/api/mpesa/
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_SENDER_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
