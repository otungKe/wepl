databases:
  - name: wepl-db
    databaseName: wepl
    user: wepl
    plan: free

services:
  - type: redis
    name: wepl-redis
    plan: free
    ipAllowList: []

  - type: web
    name: wepl-api
    runtime: python
    rootDir: backend
    plan: free
    # Pin the interpreter — Render otherwise defaults to its latest Python (3.14+),
    # which drifts from CI (3.12). Also pinned via backend/.python-version.
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    # start.sh also launches Celery worker + beat in-process. Splitting them into
    # dedicated services is the target (P0-01) but needs a paid worker plan / a
    # chosen platform — deferred for now.
    startCommand: bash start.sh
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: wepl-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://wepl-api.onrender.com
      # OTP delivery: 'console' logs the code (visible in logs) instead of sending
      # real SMS. STAGING_OTP_BYPASS is forced off here — production refuses to boot
      # with it enabled (see config/settings/production.py). Setting it explicitly
      # (rather than just omitting it) means a blueprint re-sync actively clears any
      # leftover STAGING_OTP_BYPASS=true that was set directly on the service.
      - key: STAGING_OTP_BYPASS
        value: "false"
      - key: SMS_BACKEND
        value: console
      # Email delivery: 'console' writes KYC verification emails (with their link)
      # to the logs, same as SMS_BACKEND. Swap EMAIL_BACKEND for an SMTP backend
      # and add EMAIL_HOST_* creds to send real mail.
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: DEFAULT_FROM_EMAIL
        value: WEPL <no-reply@wepl.app>
      - key: DB_NAME
        fromDatabase:
          name: wepl-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: wepl-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: wepl-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: wepl-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: wepl-db
          property: port
      - key: REDIS_URL
        fromService:
          type: redis
          name: wepl-redis
          property: connectionString
      - key: REDIS_CACHE_URL
        fromService:
          type: redis
          name: wepl-redis
          property: connectionString
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_BASE_URL
        value: https://sandbox.safaricom.co.ke
      - key: MPESA_CALLBACK_URL
        value: https://wepl-api.onrender.com/api/mpesa/
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_SENDER_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      # ── Durable media storage (S3 / Cloudflare R2) ──────────────────────────
      # Flip USE_S3 to "true" and populate the creds below so KYC/profile uploads
      # survive redeploys (the dyno disk is ephemeral). See production.py.
      - key: USE_S3
        value: "false"
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_REGION_NAME
        value: auto
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
