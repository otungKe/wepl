services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-wepl}
      POSTGRES_USER:     ${DB_USER:-wepl}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wepl}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django / Daphne (ASGI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY:             ${SECRET_KEY}
      DB_NAME:                ${DB_NAME:-wepl}
      DB_USER:                ${DB_USER:-wepl}
      DB_PASSWORD:            ${DB_PASSWORD:-password}
      DB_HOST:                db
      DB_PORT:                5432
      REDIS_URL:              redis://redis:6379/0
      ALLOWED_HOSTS:          ${ALLOWED_HOSTS:-localhost}
      CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
      MPESA_CONSUMER_KEY:     ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET:  ${MPESA_CONSUMER_SECRET}
      MPESA_SHORTCODE:        ${MPESA_SHORTCODE}
      MPESA_PASSKEY:          ${MPESA_PASSKEY}
      MPESA_BASE_URL:         ${MPESA_BASE_URL:-https://sandbox.safaricom.co.ke}
      MPESA_CALLBACK_URL:     ${MPESA_CALLBACK_URL}
      MPESA_B2C_INITIATOR_NAME:      ${MPESA_B2C_INITIATOR_NAME:-testapi}
      MPESA_B2C_SECURITY_CREDENTIAL: ${MPESA_B2C_SECURITY_CREDENTIAL}
      MPESA_B2C_RESULT_URL:          ${MPESA_B2C_RESULT_URL}
      MPESA_B2C_TIMEOUT_URL:         ${MPESA_B2C_TIMEOUT_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  # ── Celery worker ─────────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY:             ${SECRET_KEY}
      DB_NAME:                ${DB_NAME:-wepl}
      DB_USER:                ${DB_USER:-wepl}
      DB_PASSWORD:            ${DB_PASSWORD:-password}
      DB_HOST:                db
      DB_PORT:                5432
      REDIS_URL:              redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info -Q default,notifications,payments,financial --concurrency=4

  # ── Celery Beat (scheduler) ───────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY:             ${SECRET_KEY}
      DB_NAME:                ${DB_NAME:-wepl}
      DB_USER:                ${DB_USER:-wepl}
      DB_PASSWORD:            ${DB_PASSWORD:-password}
      DB_HOST:                db
      DB_PORT:                5432
      REDIS_URL:              redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  pgdata:
  redisdata:
  media:
